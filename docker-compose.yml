version: '3.8'

services:
  frontend:
    image: frontend-image
    ports:
      - '3000:3000'
    depends_on:
      - backend

  backend:
    image: backend-image
    ports:
      - '5000:5000'
    environment:
      - DATABASE_URL=mysql://user:password@db:3306/dbname
    depends_on:
      - db

  db:
    image: mysql:5.7
    volumes:
      - db-data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=dbname

volumes:
  db-data:
